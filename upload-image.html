<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Guide Image</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>📷 Upload Guide Image</h1>
<p>Mobile Repair Hub Admin</p>
</header>

<div class="card">

<h2>Select Image</h2>

<input type="file" id="imageFile" accept="image/*">

<br><br>

<img
id="previewImage"
style="
display:none;
width:100%;
max-width:300px;
border-radius:10px;
">

<br><br>

<button id="uploadBtn">
☁ Upload Image
</button>

<br><br>

<p id="uploadStatus"></p>

<br><br>

<input
type="text"
id="imageUrl"
readonly
placeholder="Uploaded image URL will appear here">

<br><br>

<button id="copyBtn">
📋 Copy Image URL
</button>

<br><br>

<a href="admin.html">
<button>
⬅ Back to Dashboard
</button>
</a>

</div>

<script type="module" src="upload-image.js"></script>

</body>
</html>
