<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Guide</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>✏️ Edit Repair Guide</h1>
<p>Update Guide</p>
</header>

<div class="card">

<input type="text" id="brand" placeholder="Brand" readonly>

<br><br>

<input type="text" id="model" placeholder="Model" readonly>

<br><br>

<input type="text" id="repairType" placeholder="Repair Type">

<br><br>

<input type="text" id="imageUrl" placeholder="Image URL">

<br><br>

<input type="text" id="videoUrl" placeholder="Video URL">

<br><br>

<textarea
id="guide"
rows="12"
placeholder="Repair Guide"></textarea>

<br><br>

<button id="updateBtn">
💾 Update Guide
</button>

<br><br>

<a href="manage-guides.html">
<button>
⬅ Back
</button>
</a>

</div>

<script type="module" src="edit-guide.js"></script>

</html>
